<!-- SweetAlert2 Flash Messages – include this once before </body> -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
(function() {
    var messages = [
        {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for category, message in msgs %}
        { cat: "{{ category }}", msg: {{ message | tojson }} }{% if not loop.last %},{% endif %}
        {% endfor %}
        {% endwith %}
    ];

    var iconMap = { success: 'success', error: 'error', warning: 'warning', info: 'info', danger: 'error' };
    var colorMap = {
        success: '#16a34a', error: '#dc2626', warning: '#d97706',
        info:    '#2563eb', danger: '#dc2626'
    };

    messages.forEach(function(m) {
        var icon  = iconMap[m.cat]  || 'info';
        var color = colorMap[m.cat] || '#16a34a';
        Swal.fire({
            position: 'center',
            icon: icon,
            title: m.msg,
            showConfirmButton: false,
            timer: 5000,
            timerProgressBar: true,
            iconColor: color,
            customClass: {
                popup:      'swal-vegmart-popup',
                title:      'swal-vegmart-title',
                timerProgressBar: 'swal-vegmart-bar-' + m.cat
            },
            didOpen: function(toast) {
                toast.addEventListener('mouseenter', Swal.stopTimer);
                toast.addEventListener('mouseleave', Swal.resumeTimer);
            }
        });
    });
})();
</script>
<style>
    .swal-vegmart-popup {
        font-family: 'Inter', 'Segoe UI', sans-serif !important;
        border-radius: 14px !important;
        padding: 14px 18px !important;
        max-width: 450px !important;
    }
    .swal-vegmart-title {
        font-size: 14px !important;
        font-weight: 600 !important;
        color: #1e293b !important;
    }
    /* colored progress bars per category */
    .swal-vegmart-bar-success { background: #16a34a !important; }
    .swal-vegmart-bar-error   { background: #dc2626 !important; }
    .swal-vegmart-bar-danger  { background: #dc2626 !important; }
    .swal-vegmart-bar-warning { background: #d97706 !important; }
    .swal-vegmart-bar-info    { background: #2563eb !important; }
</style>
