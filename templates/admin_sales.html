<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Report – VEGMART Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sidebar-w: 260px;
            --green: #16a34a;
            --green-dark: #15803d;
            --green-light: #dcfce7;
            --green-mid: #22c55e;
            --accent: #f59e0b;
            --dark: #0f172a;
            --sidebar-bg: #0f172a;
            --content-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 14px;
            --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 4px 16px rgba(0, 0, 0, .06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--content-bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 26px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .brand-text strong {
            font-size: 17px;
            font-weight: 800;
            color: #fff;
            letter-spacing: .5px;
            display: block;
        }

        .brand-text small {
            font-size: 11px;
            color: #64748b;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.2px;
            color: #475569;
            text-transform: uppercase;
            padding: 8px 10px 4px;
            margin-top: 8px;
            display: block;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all .2s;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, .12);
            color: #e2e8f0;
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(22, 163, 74, .25), rgba(22, 163, 74, .1));
            color: #4ade80;
            border-left: 3px solid var(--green-mid);
            padding-left: 11px;
        }

        .nav-item i {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255, 255, 255, .08);
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            color: #f87171;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background .2s;
        }

        .sidebar-footer a:hover {
            background: rgba(248, 113, 113, .12);
        }

        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 800;
        }

        .topbar p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
        }

        .content {
            padding: 28px 32px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: var(--green);
        }

        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .mini-stat {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 22px;
            box-shadow: var(--shadow);
        }

        .mini-stat label {
            font-size: 11.5px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .mini-stat .val {
            font-size: 26px;
            font-weight: 800;
            color: var(--green);
            margin-top: 4px;
        }

        .mini-stat .val.amber {
            color: var(--accent);
        }

        /* Filter bar */
        .filter-bar {
            background: transparent;
            border: none;
            padding: 0;
            display: flex;
            align-items: flex-end;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            box-shadow: none;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 140px;
        }

        .filter-group label {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .filter-group input {
            padding: 9px 14px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }

        .filter-group input:focus {
            border-color: var(--green);
        }

        .filter-btn {
            padding: 9px 20px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn-green {
            background: var(--green);
            color: #fff;
        }

        .filter-btn-green:hover {
            background: var(--green-dark);
        }

        .filter-btn-clear {
            background: var(--content-bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .filter-btn-clear:hover {
            background: var(--border);
        }

        .results-bar {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 14px;
            font-weight: 500;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13.5px;
        }

        .data-table thead tr {
            background: #f8fafc;
        }

        .data-table th {
            padding: 12px 20px;
            text-align: left;
            font-weight: 700;
            font-size: 11.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 14px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table tbody tr:hover {
            background: #f8fafc;
        }

        .price-tag {
            font-weight: 700;
            color: var(--green);
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11.5px;
            font-weight: 600;
        }

        .badge-green {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .badge-amber {
            background: #fef3c7;
            color: #92400e;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main {
                margin-left: 0;
            }

            .topbar {
                padding: 14px 16px;
            }

            .content {
                padding: 20px 16px;
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">🥬</div>
            <div class="brand-text">
                <strong>VEGMART</strong>
                <small>Admin Panel</small>
            </div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <span class="nav-section-label">Main</span>
        <a href="{{ url_for('admin_dashboard') }}" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
        <span class="nav-section-label">Store</span>
        <a href="{{ url_for('add_item') }}" class="nav-item"><i class="fas fa-plus-circle"></i> Add Product</a>
        <a href="{{ url_for('admin_inventory') }}" class="nav-item"><i class="fas fa-boxes"></i> Inventory</a>
        <span class="nav-section-label">People</span>
        <a href="{{ url_for('admin_users') }}" class="nav-item"><i class="fas fa-user-shield"></i> Users</a>
        <a href="{{ url_for('admin_sales') }}" class="nav-item active"><i class="fas fa-chart-line"></i> Sales Report</a>

    </nav>
    <div class="sidebar-footer">
        <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div>
            <h1>Sales Report</h1>
            <p>Track all your store transactions</p>
        </div>
    </aside>

    <div class="main">
                <div class="topbar">
                    <div>
                        <h1>Sales Report</h1>
                        <p>Track all your store transactions</p>
                    </div>
                    <div class="topbar-right">
                        <div class="avatar">A</div>
                    </div>
                </div>

        <form id="searchForm" method="POST">
            <div class="filter-bar">
                <div class="filter-group" style="flex:2;">
                    <label><i class="fas fa-search"></i> Search</label>
                    <input type="text" name="search" placeholder="Search product or customer…" value="{{ search }}">
                </div>
                <div class="filter-group" style="flex:1;">
                    <label>Date</label>
                    <input type="date" name="date" value="{{ date }}">
                </div>
            </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const searchInput = document.querySelector('input[name="search"]');
            if (searchInput) {
                // Restore focus and cursor position
                let val = searchInput.value;
                if (val) {
                    searchInput.focus();
                    searchInput.setSelectionRange(val.length, val.length);
                }
            }

        <div id="salesContainer">

        <p class="results-bar">Showing <strong>{{ sales|length }}</strong> record{{ 's' if sales|length != 1 }}</p>

        <div class="stat-row">
            <div class="mini-stat">
                <label>Total Sales Volume</label>
                <div class="val amber">{{ sales|length }}</div>
            </div>
            <div class="mini-stat">
                <label>Revenue for Period</label>
                <div class="val">₹{{ "%.0f"|format(total_sales) }}</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-chart-line" style="color:var(--green);margin-right:8px;"></i>Transaction History</h3>
                <span class="badge badge-green">{{ sales|length }} sales</span>
            </div>
            <div style="overflow-x:auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Price/kg</th>
                            <th>Total</th>
                            <th>Customer</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if sales %}
                            {% for sale in sales %}
                            <tr>
                                <td style="color:var(--text-muted);">{{ loop.index }}</td>
                                <td><strong>{{ sale[1]|upper }}</strong></td>
                                <td><span class="badge badge-amber">{{ sale[2] }} kg</span></td>
                                <td>₹{{ sale[3] }}</td>
                                <td><span class="price-tag">₹{{ sale[4] }}</span></td>
                                <td>{{ sale[5] }}</td>
                                <td style="color:var(--text-muted);font-size:12.5px;">{{ sale[6] }}</td>
                            </tr>
                            {% endfor %}
                        {% else %}
                        <tr>
                            <td colspan="7" style="text-align:center;padding:50px;color:var(--text-muted);">
                                <i class="fas fa-receipt" style="font-size:36px;opacity:.25;margin-bottom:12px;display:block;"></i>
                                No sales found matching your filters.
                            </td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
        </div>
    </div>
</div>

<script>
    let searchTimeout;
    const searchForm = document.getElementById('searchForm');
    if (searchForm) {
        const inputs = searchForm.querySelectorAll('input');
        searchForm.addEventListener('submit', function (e) {
            e.preventDefault();
        });

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    fetch(window.location.pathname, {
                        method: 'POST',
                        body: new FormData(searchForm)
                    })
                    .then(res => res.text())
                    .then(html => {
                        const doc = new DOMParser().parseFromString(html, 'text/html');
                        const newContainer = doc.getElementById('salesContainer');
                        if(newContainer) {
                            document.getElementById('salesContainer').innerHTML = newContainer.innerHTML;
                        }
                    })
                    .catch(e => console.error("Filter error:", e));
                }, 400);
            });
        });

        const searchInput = document.querySelector('input[name="search"]');
        if (searchInput && searchInput.value) {
            const val = searchInput.value;
            searchInput.value = '';
            searchInput.value = val;
            searchInput.focus();
        }
    }
</script>
</body>

</html>
