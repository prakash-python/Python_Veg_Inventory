<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand fw-bold">🥬 VEGMART - Admin</span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light">Logout</a>
        </div>
    </nav>
    
    <div class="container py-5">
        <h1 class="mb-4">Customer List</h1>
        
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-4">Back to Dashboard</a>
        
        <h4 class="mb-4">Total Customers: <span class="badge bg-primary">{{ customers|length }}</span></h4>
        
        <div class="table-responsive">
            <table class="table table-hover table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Customer Name</th>
                        <th>Phone Number</th>
                        <th>Date Added</th>
                    </tr>
                </thead>
                <tbody>
                    {% if customers %}
                        {% for customer in customers %}
                        <tr>
                            <td>{{ customer[1] }}</td>
                            <td>{{ customer[2] }}</td>
                            <td>{{ customer[3] }}</td>
                        </tr>
                        {% endfor %}
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">No customers yet</td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
